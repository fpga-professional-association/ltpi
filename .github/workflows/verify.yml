name: verify

# CI for the LTPI IP core. Three vendor-neutral gates run on every push / PR:
#   lint    - iverilog elaboration of both endpoint tops (blocking) + verilator lint (advisory)
#   sim     - Icarus end-to-end dual-rate SCM<->HPM link  -> must report "PASS 11/11"
#   formal  - SymbiYosys + boolector, one job per proof   -> each must end PASS
# Quartus synthesis + STA is proprietary and Windows-hosted, so it is NOT run here;
# see syn/altera/README.md to reproduce it locally.

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------------------
  # Fast lint gate (no heavy toolchain): elaborate both tops with Icarus, then a
  # non-blocking verilator lint pass for style/width advisories.
  # ----------------------------------------------------------------------------
  lint:
    name: Lint & elaborate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install iverilog + verilator
        run: sudo apt-get update && sudo apt-get install -y iverilog verilator

      - name: Elaborate endpoint tops (iverilog -g2012, must compile clean)
        run: |
          set -euo pipefail
          for top in ltpi_scm_top ltpi_hpm_top; do
            echo "== elaborate $top =="
            iverilog -g2012 -I rtl -t null -s "$top" "rtl/$top.sv"
          done
          echo "both tops elaborate clean"

      - name: Verilator lint (advisory — does not fail the build)
        continue-on-error: true
        run: |
          for top in ltpi_scm_top ltpi_hpm_top; do
            echo "== verilator lint $top =="
            verilator --lint-only -sv -Wall -Wno-fatal \
              -Wno-DECLFILENAME -Wno-MULTITOP -Wno-IMPORTSTAR \
              +incdir+rtl "rtl/$top.sv" || true
          done

  # ----------------------------------------------------------------------------
  # End-to-end simulation: live dual-rate SCM<->HPM link, all channels. Only
  # needs Icarus, so it runs fast and independent of the formal toolchain.
  # ----------------------------------------------------------------------------
  sim:
    name: Simulation (Icarus)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Run SCM<->HPM link sim (must report PASS 11/11)
        run: |
          set -euo pipefail
          ./sim/run.sh | tee /tmp/sim.log
          grep -q "PASS 11/11" /tmp/sim.log

  # ----------------------------------------------------------------------------
  # Formal proofs: one job per .sby so each proof shows as its own check. Each
  # leg is self-sufficient — it restores the OSS CAD Suite from cache, or
  # downloads it (~700 MB, a few seconds on the runner) on a cache miss. This
  # avoids a fragile cross-job cache dependency; after the first run every leg
  # hits the warm cache. Each proof must end PASS (no FAIL/ERROR/UNKNOWN tasks).
  # ----------------------------------------------------------------------------
  formal:
    name: Formal
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        proof:
          - ltpi_8b10b
          - ltpi_frame
          - ltpi_cdc_fifo
          - ltpi_link_fsm
          - ltpi_gpio_chan
          - ltpi_i2c_relay
          - ltpi_data_chan
          - ltpi_csr
    steps:
      - uses: actions/checkout@v4

      - name: Cache OSS CAD Suite
        id: cache-oss
        uses: actions/cache@v4
        with:
          path: ~/eda-tools/oss-cad-suite
          key: oss-cad-suite-v1

      - name: Download OSS CAD Suite (yosys + SymbiYosys + boolector) on cache miss
        if: steps.cache-oss.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p ~/eda-tools && cd ~/eda-tools
          URL=$(curl -sL -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/YosysHQ/oss-cad-suite-build/releases/latest \
            | grep -oE '"browser_download_url": *"[^"]*linux-x64[^"]*\.tgz"' \
            | head -1 | sed -E 's/.*"(https[^"]+)"/\1/')
          echo "Downloading $URL"
          curl -L --retry 3 -o oss.tgz "$URL"
          tar xzf oss.tgz && rm oss.tgz

      - name: Put the toolchain on PATH
        run: echo "$HOME/eda-tools/oss-cad-suite/bin" >> "$GITHUB_PATH"

      - name: Tool versions
        run: yosys -V | head -1 && sby --version

      - name: Prove ${{ matrix.proof }}
        working-directory: formal
        run: |
          set -uo pipefail
          out=$(sby -f "${{ matrix.proof }}.sby" 2>&1); rc=$?
          echo "$out"
          if [ "$rc" -ne 0 ] || echo "$out" | grep -qE "DONE \((FAIL|ERROR|UNKNOWN)"; then
            echo "::error::formal proof FAILED: ${{ matrix.proof }}"
            exit 1
          fi
          echo "formal proof PASSED: ${{ matrix.proof }}"

  # ----------------------------------------------------------------------------
  # Single aggregate check to gate branch protection on lint + sim + formal.
  # ----------------------------------------------------------------------------
  verify-complete:
    name: verify complete
    needs: [lint, sim, formal]
    runs-on: ubuntu-latest
    steps:
      - run: echo "lint + sim + formal all green"
